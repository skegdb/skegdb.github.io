name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Snapshot pushes the refreshed JSONL with GITHUB_TOKEN, which by GH
  # Actions policy does NOT trigger downstream `push` workflows (loop
  # protection). So Pages would stay frozen on the last human-pushed
  # build between snapshots. Listen for Snapshot completion explicitly
  # so each hourly refresh redeploys.
  workflow_run:
    workflows: [Snapshot]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci || npm install

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
